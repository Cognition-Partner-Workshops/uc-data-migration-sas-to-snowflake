name: sas_to_databricks_migration
version: '1.0.0'
config-version: 2

profile: 'databricks'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

vars:
  # SAS macro variable equivalents (from autoexec.sas)
  environment: "{{ env_var('DBT_ENVIRONMENT', 'dev') }}"
  curr_dt: "{{ run_started_at.strftime('%Y-%m-%d') }}"
  prev_ym: "{{ (run_started_at - modules.datetime.timedelta(days=30)).strftime('%Y%m') }}"
  max_obs_warn: 10000000

models:
  sas_to_databricks_migration:
    staging:
      +schema: staging
      +materialized: view
      +tags: ['staging']
    intermediate:
      +schema: intermediate
      +materialized: table
      +tags: ['intermediate']
    marts:
      +schema: marts
      +materialized: table
      +tags: ['marts']

seeds:
  sas_to_databricks_migration:
    +schema: seeds
