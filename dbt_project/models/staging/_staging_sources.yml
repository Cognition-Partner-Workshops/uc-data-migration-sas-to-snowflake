version: 2

sources:
  - name: banking_raw
    description: >
      Raw banking data. In the SAS environment these were accessed via
      LIBNAME ORA_DW (Oracle) and RAW_BANK (file-based).
      In Databricks, these are external tables in Unity Catalog.
    database: banking_analytics
    schema: raw
    tables:
      - name: cust_accounts
        description: "Customer account master (SAS: ORA_DW.CUST_ACCOUNTS)"
      - name: cust_demographics
        description: "Customer demographics (SAS: ORA_DW.CUST_DEMOGRAPHICS)"
      - name: daily_transactions
        description: "Daily transaction feed (SAS: RAW_BANK.TXN_FEED_YYYYMMDD)"
      - name: loan_details
        description: "Loan detail records (SAS: ORA_DW.LOAN_DETAILS)"
      - name: bureau_scores
        description: "Credit bureau scores (SAS: ORA_DW.BUREAU_SCORES)"
      - name: payment_history
        description: "Payment history (SAS: ORA_DW.PAYMENT_HISTORY)"
      - name: collateral
        description: "Collateral records (SAS: ORA_DW.COLLATERAL)"

  - name: insurance_raw
    description: >
      Raw insurance data. In SAS accessed via RAW_INS and TERA_DW (Teradata).
    database: banking_analytics
    schema: raw
    tables:
      - name: policies
        description: "Policy master (SAS: RAW_INS.POLICIES)"
      - name: claims
        description: "Claims register (SAS: RAW_INS.CLAIMS)"
      - name: premiums
        description: "Premium payments (SAS: RAW_INS.PREMIUMS)"
      - name: fraud_indicators
        description: "Fraud scoring model output (SAS: TERA_DW.FRAUD_INDICATORS)"
